<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard :: Site-416 DIA</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">416</div>
        <div class="brand-text">Internal Auditing<small>Site-416</small></div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="personnel.html">Personnel</a>
        <a href="documents.html">Documents</a>
        <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="signout-link">Sign Out</a>
      </nav>
    </div>
  </div>

  <div class="container mt-24 mb-24" style="flex:1;">

    <div class="flex-between mb-24" style="flex-wrap: wrap; gap: 12px;">
      <div>
        <h2 id="welcome-name" style="margin-bottom:6px;">Loading...</h2>
        <span id="profile-stamp"></span>
      </div>
    </div>

    <div class="grid mb-24">
      <div class="stat-card">
        <div class="stat-num" id="stat-personnel">—</div>
        <div class="stat-label">Personnel in Division</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-documents">—</div>
        <div class="stat-label">Documents on Record</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-clearance">—</div>
        <div class="stat-label">Clearance Level</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>Recent Documents</span>
        <a href="documents.html" class="mono" style="font-size:11px;">VIEW ALL &rarr;</a>
      </div>
      <div id="recent-docs">
        <div class="empty-state">Loading records...</div>
      </div>
    </div>

  </div>

  <footer>SCP FOUNDATION &mdash; SITE-416 &mdash; SECURE. CONTAIN. PROTECT.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
(async () => {
  await requireSession();
  const profile = await getCurrentProfile();

  if (!profile) {
    // Session exists but no profile row yet — invite redemption likely failed.
    document.getElementById("welcome-name").textContent = "Profile not found";
    return;
  }

  document.getElementById("welcome-name").textContent = `Welcome, ${profile.full_name}`;
  document.getElementById("profile-stamp").innerHTML = renderStamp(profile);
  document.getElementById("stat-clearance").textContent = `L${profile.clearance_level}`;

  if (profile.role === "admin") {
    document.getElementById("admin-link").style.display = "inline";
  }

  // Personnel count in division
  const { count: personnelCount } = await supabaseClient
    .from("personnel_records")
    .select("*", { count: "exact", head: true })
    .eq("division", profile.division);
  document.getElementById("stat-personnel").textContent = personnelCount ?? 0;

  // Documents visible to this user
  const { data: docs, count: docCount } = await supabaseClient
    .from("documents")
    .select("id, title, classification_level, created_at", { count: "exact" })
    .order("created_at", { ascending: false })
    .limit(5);

  document.getElementById("stat-documents").textContent = docCount ?? 0;

  const recentDocsEl = document.getElementById("recent-docs");
  if (!docs || docs.length === 0) {
    recentDocsEl.innerHTML = `<div class="empty-state">No documents on file yet. Create one from the Documents tab.</div>`;
  } else {
    recentDocsEl.innerHTML = `
      <table>
        <thead><tr><th>Title</th><th>Classification</th><th>Filed</th></tr></thead>
        <tbody>
          ${docs.map(d => `
            <tr>
              <td>${escapeHtml(d.title)}</td>
              <td class="mono">L${d.classification_level}</td>
              <td class="mono muted">${new Date(d.created_at).toLocaleDateString()}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  document.getElementById("signout-link").addEventListener("click", (e) => {
    e.preventDefault();
    signOut();
  });

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>

</body>
</html>
