<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents :: Site-416 DIA</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">416</div>
        <div class="brand-text">Internal Auditing<small>Site-416</small></div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="personnel.html">Personnel</a>
        <a href="documents.html" class="active">Documents</a>
        <a href="banking.html">Banking</a>
        <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="signout-link">Sign Out</a>
      </nav>
    </div>
  </div>

  <div class="container mt-24 mb-24" style="flex:1;">

    <div class="flex-between mb-24" style="flex-wrap: wrap; gap: 12px;">
      <h2 style="margin:0;">Documents &amp; Findings</h2>
      <button class="btn" id="new-doc-btn" style="display:none;">+ New Document</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="division">My Division</button>
      <button class="tab-btn" data-tab="department">Department-Wide</button>
    </div>

    <div id="new-doc-panel" class="panel mb-24" style="display:none;">
      <div class="panel-title"><span>File New Document</span></div>
      <div id="doc-error" class="error-box"></div>
      <form id="doc-form">
        <div class="field"><label>Title</label><input type="text" id="d-title" required></div>
        <div class="field">
          <label>Visible To Ranks <span class="muted">(leave all unchecked to allow everyone in scope)</span></label>
          <div class="flex gap-12" style="flex-wrap:wrap;" id="rank-checkboxes"></div>
        </div>
        <div class="checkbox-field">
          <input type="checkbox" id="d-department-wide">
          <label for="d-department-wide">Post as Department-Wide (visible to all divisions, subject to rank restriction above)</label>
        </div>
        <div class="field"><label>Body</label><textarea id="d-body" rows="6" required></textarea></div>
        <div class="flex gap-12">
          <button type="submit" class="btn">File Document</button>
          <button type="button" class="btn ghost" id="cancel-doc-btn">Cancel</button>
        </div>
      </form>
    </div>

    <div id="doc-list" class="panel">
      <div class="panel-title"><span id="doc-list-title">Division Documents</span></div>
      <div id="doc-list-inner"><div class="empty-state">Loading...</div></div>
    </div>

  </div>

  <footer>SCP FOUNDATION &mdash; SITE-416 &mdash; SECURE. CONTAIN. PROTECT.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
(async () => {
  await requireSession();
  const profile = await getCurrentProfile();
  if (!profile) return;

  let allDocs = [];
  let activeTab = "division";

  if (profile.role === "admin") document.getElementById("admin-link").style.display = "inline";

  const canWrite = canPostDocuments(profile);
  if (canWrite) document.getElementById("new-doc-btn").style.display = "inline-flex";

  document.getElementById("rank-checkboxes").innerHTML = RANKS.map(r => `
    <label style="display:flex; align-items:center; gap:6px; text-transform:none; font-family:var(--font-body); font-size:13.5px; color:var(--paper);">
      <input type="checkbox" class="rank-check" value="${r}" style="width:16px; height:16px; accent-color:var(--purple-br);"> ${r}
    </label>
  `).join("");

  document.getElementById("new-doc-btn").addEventListener("click", () => {
    document.getElementById("new-doc-panel").style.display = "block";
  });
  document.getElementById("cancel-doc-btn").addEventListener("click", () => {
    document.getElementById("new-doc-panel").style.display = "none";
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      document.getElementById("doc-list-title").textContent =
        activeTab === "division" ? "Division Documents" : "Department-Wide Documents";
      renderDocs();
    });
  });

  document.getElementById("doc-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("doc-error");
    errorBox.classList.remove("show");

    const checkedRanks = Array.from(document.querySelectorAll(".rank-check:checked")).map(c => c.value);

    const payload = {
      title: document.getElementById("d-title").value.trim(),
      allowed_ranks: checkedRanks.length > 0 ? checkedRanks : null,
      department_wide: document.getElementById("d-department-wide").checked,
      body: document.getElementById("d-body").value.trim(),
      division: profile.division,
      author: profile.id
    };

    const { data, error } = await supabaseClient.from("documents").insert(payload).select().single();

    if (error) {
      errorBox.textContent = error.message;
      errorBox.classList.add("show");
      return;
    }

    await logAction("document.create", "documents", data.id, { title: data.title });
    document.getElementById("new-doc-panel").style.display = "none";
    e.target.reset();
    loadDocs();
  });

  function renderDocs() {
    const filtered = allDocs.filter(d => activeTab === "division" ? !d.department_wide : d.department_wide);
    const el = document.getElementById("doc-list-inner");

    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty-state">Nothing on file yet within your access.</div>`;
      return;
    }

    el.innerHTML = filtered.map(d => `
      <div class="panel" style="margin-top:12px;">
        <div class="flex-between" style="align-items:flex-start;">
          <h3 style="margin-bottom:4px;">${escapeHtml(d.title)}</h3>
          <span class="stamp"><span class="stamp-dot"></span>${d.allowed_ranks ? d.allowed_ranks.join("/") : "ALL RANKS"}</span>
        </div>
        <p class="muted mono" style="font-size:11px; margin-bottom:12px;">
          ${d.department_wide ? "DEPARTMENT-WIDE" : escapeHtml(d.division).toUpperCase()} &middot; FILED ${new Date(d.created_at).toLocaleString()}
        </p>
        <p style="white-space: pre-wrap;">${escapeHtml(d.body)}</p>
      </div>
    `).join("");
  }

  async function loadDocs() {
    const { data, error } = await supabaseClient
      .from("documents")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("doc-list-inner").innerHTML = `<div class="empty-state">Failed to load documents: ${error.message}</div>`;
      return;
    }

    allDocs = data || [];
    renderDocs();
  }

  loadDocs();

  document.getElementById("signout-link").addEventListener("click", (e) => {
    e.preventDefault();
    signOut();
  });
})();
</script>

</body>
</html>
