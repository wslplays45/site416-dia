<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personnel :: Site-416 DIA</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">416</div>
        <div class="brand-text">Internal Auditing<small>Site-416</small></div>
      </div>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="personnel.html" class="active">Personnel</a>
        <a href="documents.html">Documents</a>
        <a href="banking.html">Banking</a>
        <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
        <a href="#" id="signout-link">Sign Out</a>
      </nav>
    </div>
  </div>

  <div class="container mt-24 mb-24" style="flex:1;">

    <div class="flex-between mb-24" style="flex-wrap: wrap; gap: 12px;">
      <h2 style="margin:0;">Personnel Roster</h2>
      <button class="btn" id="new-record-btn" style="display:none;">+ New Record</button>
    </div>

    <div id="new-record-panel" class="panel mb-24" style="display:none;">
      <div class="panel-title"><span>New Personnel Record</span></div>
      <div id="record-error" class="error-box"></div>
      <form id="record-form">
        <div class="grid gap-12">
          <div class="field"><label>Full Name</label><input type="text" id="r-name" required></div>
          <div class="field"><label>Callsign</label><input type="text" id="r-callsign" class="mono"></div>
          <div class="field"><label>Rank</label><input type="text" id="r-rank" required></div>
          <div class="field">
            <label>Status</label>
            <select id="r-status">
              <option value="active">Active</option>
              <option value="reassigned">Reassigned</option>
              <option value="reserve">Reserve</option>
              <option value="terminated">Terminated</option>
            </select>
          </div>
          <div class="field">
            <label>Clearance Level</label>
            <select id="r-clearance">
              <option value="1">L1</option><option value="2">L2</option>
              <option value="3">L3</option><option value="4">L4</option><option value="5">L5</option>
            </select>
          </div>
        </div>
        <div class="field"><label>Notes</label><textarea id="r-notes"></textarea></div>
        <div class="flex gap-12">
          <button type="submit" class="btn">Save Record</button>
          <button type="button" class="btn ghost" id="cancel-record-btn">Cancel</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <div class="panel-title"><span>Division Roster</span></div>
      <div id="roster-table"><div class="empty-state">Loading...</div></div>
    </div>

  </div>

  <footer>SCP FOUNDATION &mdash; SITE-416 &mdash; SECURE. CONTAIN. PROTECT.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
(async () => {
  await requireSession();
  const profile = await getCurrentProfile();
  if (!profile) return;

  if (profile.role === "admin") document.getElementById("admin-link").style.display = "inline";

  const canWrite = roleRank(profile.role) >= roleRank("supervisor");
  if (canWrite) document.getElementById("new-record-btn").style.display = "inline-flex";

  document.getElementById("new-record-btn").addEventListener("click", () => {
    document.getElementById("new-record-panel").style.display = "block";
  });
  document.getElementById("cancel-record-btn").addEventListener("click", () => {
    document.getElementById("new-record-panel").style.display = "none";
  });

  document.getElementById("record-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("record-error");
    errorBox.classList.remove("show");

    const payload = {
      full_name: document.getElementById("r-name").value.trim(),
      callsign: document.getElementById("r-callsign").value.trim() || null,
      rank: document.getElementById("r-rank").value.trim(),
      status: document.getElementById("r-status").value,
      clearance_level: parseInt(document.getElementById("r-clearance").value, 10),
      notes: document.getElementById("r-notes").value.trim() || null,
      division: profile.division,
      created_by: profile.id
    };

    const { data, error } = await supabaseClient.from("personnel_records").insert(payload).select().single();

    if (error) {
      errorBox.textContent = error.message;
      errorBox.classList.add("show");
      return;
    }

    await logAction("personnel.create", "personnel_records", data.id, { name: data.full_name });
    document.getElementById("new-record-panel").style.display = "none";
    e.target.reset();
    loadRoster();
  });

  async function loadRoster() {
    const { data, error } = await supabaseClient
      .from("personnel_records")
      .select("*")
      .order("full_name", { ascending: true });

    const el = document.getElementById("roster-table");

    if (error) {
      el.innerHTML = `<div class="empty-state">Failed to load roster: ${error.message}</div>`;
      return;
    }

    if (!data || data.length === 0) {
      el.innerHTML = `<div class="empty-state">No personnel records on file for your division yet.</div>`;
      return;
    }

    el.innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>Callsign</th><th>Rank</th><th>Status</th><th>Clearance</th></tr></thead>
        <tbody>
          ${data.map(p => `
            <tr>
              <td>${escapeHtml(p.full_name)}</td>
              <td class="mono muted">${escapeHtml(p.callsign || "—")}</td>
              <td>${escapeHtml(p.rank)}</td>
              <td><span class="stamp role-${p.status === 'active' ? 'auditor' : 'viewer'}" style="font-size:9.5px; padding:2px 9px;">${p.status}</span></td>
              <td class="mono">L${p.clearance_level}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  loadRoster();

  document.getElementById("signout-link").addEventListener("click", (e) => {
    e.preventDefault();
    signOut();
  });
})();
</script>

</body>
</html>
